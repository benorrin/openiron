version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openiron-postgres
    environment:
      POSTGRES_USER: openiron
      POSTGRES_PASSWORD: openiron_dev_password
      POSTGRES_DB: openiron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openiron"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: openiron-server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: openiron
      DB_PASSWORD: openiron_dev_password
      DB_NAME: openiron
      JWT_SECRET: your_jwt_secret_key_change_this
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin_password_change_this
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
